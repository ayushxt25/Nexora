# Orchestrates the backend API, frontend, PostgreSQL, Redis, and optional worker.
#
# Usage:
#   docker compose up --build
#
#   Then visit:
#   Frontend UI:    http://localhost:5174
#   Backend API:    http://localhost:8000
#   Swagger docs:   http://localhost:8000/docs
#
# Named volumes persist Postgres and Redis data across restarts.
#
# Notes:
# - This file is suitable for local full-stack validation and a prod-like demo.
# - For a real deployment, set exact public origins/URLs in .env and avoid the
#   insecure default SECRET_KEY.
# - PostgreSQL should back deployed environments; Redis/Celery remain optional.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: networking-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://networking:networking@postgres:5432/networking_assistant}
      - SECRET_KEY=${SECRET_KEY:-INSECURE-DEV-ONLY-CHANGE-ME}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
      - SUPABASE_AUTH_ENABLED=${SUPABASE_AUTH_ENABLED:-false}
      - SUPABASE_DUAL_AUTH_ENABLED=${SUPABASE_DUAL_AUTH_ENABLED:-true}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_AUDIENCE=${SUPABASE_AUDIENCE:-authenticated}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES:-}
      - CELERY_ENABLED=${CELERY_ENABLED:-true}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - ML_RANKER_ENABLED=${ML_RANKER_ENABLED:-false}
      - ML_RANKER_MODEL_DIR=${ML_RANKER_MODEL_DIR:-/app/data/models}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
        VITE_AUTH_PROVIDER: ${VITE_AUTH_PROVIDER:-legacy}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: networking-assistant-frontend
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: networking-assistant-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-networking_assistant}
      - POSTGRES_USER=${POSTGRES_USER:-networking}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-networking}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: networking-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: networking-assistant-worker
    profiles: ["worker"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://networking:networking@postgres:5432/networking_assistant}
      - SECRET_KEY=${SECRET_KEY:-INSECURE-DEV-ONLY-CHANGE-ME}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
      - SUPABASE_AUTH_ENABLED=${SUPABASE_AUTH_ENABLED:-false}
      - SUPABASE_DUAL_AUTH_ENABLED=${SUPABASE_DUAL_AUTH_ENABLED:-true}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_AUDIENCE=${SUPABASE_AUDIENCE:-authenticated}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES:-}
      - CELERY_ENABLED=${CELERY_ENABLED:-true}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - ML_RANKER_ENABLED=${ML_RANKER_ENABLED:-false}
      - ML_RANKER_MODEL_DIR=${ML_RANKER_MODEL_DIR:-/app/data/models}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
      celery -A app.tasks.celery_app worker --loglevel=info"
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
  redis-data:
